<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<title>Danii Oliver's RSS Editor</title>
		<link rel="stylesheet" href="{{ url_for('static', filename='systems.css') }}" />
		<script src="{{ url_for('static', filename='live-preview.js') }}"></script>
	</head>
	<body>
		<h1>Edit RSS Feed</h1>
		<h2>
			<a href="/add_item" style="display: inline-block; margin-bottom: 20px">➕ Add New Item</a>
		</h2>

		<h2>Edit Existing Items</h2>
		{% for idx, item in items %}

		<form method="post" action="/edit/{{ idx }}">
			<div class="edit-section">
				<table class="edit-table">
					{% for field, value in item.items() %}
					<tr>
						<td>
							<strong class="up">{{ field }}</strong><br />
							<span id="{{ field }}_preview_{{ idx }}">{{ value }}</span>
						</td>
						<td>
							{% if field in ["description", "itunes:summary", "title"] %}
							<textarea id="{{ field }}_input_{{ idx }}" name="{{ field }}">{{ value }}</textarea>
							{% else %}
							<input type="text" id="{{ field }}_input_{{ idx }}" name="{{ field }}" value="{{ value }}" />
							{% endif %}
						</td>
					</tr>
					{% endfor %}
				</table>
			</div>

			<!-- Save button -->
			<button class="edit-button" type="submit">&check; &nbsp; Save Updates {{ idx+1 }}</button>
		</form>

		<!-- Delete button, points to separate route, MUST BE OUTSIDE OF EDIT FORM -->
		<form method="post" action="/delete/{{ idx }}" style="display: inline">
			<button class="delete-button" type="submit" onclick="return confirm('Are you sure you want to delete entry name: {{ item.get('title', 'Unknown') }} ?');">&#x2715; &nbsp; Delete Item {{ item.get('title', 'Unknown') }}</button>
		</form>
		<hr />
		{% endfor %}
	</body>
</html>
