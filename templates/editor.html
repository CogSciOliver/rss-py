<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<title>Danii Oliver's RSS Editor</title>
		<link
			rel="stylesheet"
			href="{{ url_for('static', filename='style.css') }}"
		/>
    <script src="{{ url_for('static', filename='js/live_preview.js') }}"></script>
	</head>
	<body>
		<h1>Edit RSS Feed</h1>
		<h2>
			<a
				href="/add_item"
				style="display: inline-block; margin-bottom: 20px"
				>➕ Add New Item</a
			>
		</h2>

		<h2>Edit Existing Items</h2>
		{% for idx, item in items %}
		<form
			method="post"
			action="/edit/{{ idx }}"
		>
			<table>
				{% for field, value in item.items() %}
				<tr>
					<td><strong>{{ field }}</strong><br /><span id="{{ value }}_preview_{{ idx }}"></span>{{ value }}</td>
					<td>
        {% if field in ["description", "itunes:summary", "title"] %}
        <textarea id="{{ field }}_input_{{ idx }}" name="{{ field }}">{{ value }}</textarea>
        {% else %}
        <input type="text" id="{{ field }}_input_{{ idx }}" name="{{ field }}" value="{{ value }}" />
        {% endif %}
      </td>
				</tr>
				{% endfor %}
			</table>
			<!-- Save button -->
      <button type="submit">Save Item {{ idx+1 }}</button>
		</form>

		<!-- Delete button, points to separate route -->
      <form method="post" action="/delete/{{ idx+1 }}" style="display:inline;">
        <button type="submit" onclick="return confirm('Are you sure you want to delete this item?');">
        Delete Item {{ idx+1 }}</button>
      </form>
		<hr />
		{% endfor %}
	</body>
  
</html>
